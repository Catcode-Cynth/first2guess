<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>First2Guess</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-6xl mx-auto p-8">   <!-- Increased from p-6 to p-8 -->
    
    <div class="flex justify-between items-center mb-16">   <!-- More top margin -->
      <h1 class="text-5xl font-black tracking-tighter bg-gradient-to-r from-purple-400 via-pink-400 to-violet-400 bg-clip-text text-transparent">
        First2Guess
      </h1>
      <div id="status" class="px-5 py-2 bg-zinc-900 rounded-2xl text-sm font-medium flex items-center gap-2">
        <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
        Connected
      </div>
    </div>

    <!-- LOBBY - More space -->
    <div id="lobby" class="bg-zinc-900 rounded-3xl p-16">   <!-- Increased padding -->
      <div class="text-center mb-16">
        <h2 class="text-4xl font-bold mb-3">Guess the Secret</h2>
        <p class="text-zinc-400 text-lg">Riddles • Phrases • Emojis • Songs • Celebrities</p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-10 max-w-2xl mx-auto">   <!-- Bigger gap -->
        
        <!-- Be Game Master -->
        <div onclick="createGame()" 
             class="cursor-pointer bg-gradient-to-br from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 p-12 rounded-3xl text-center transition-all duration-300 hover:scale-105 border-2 border-purple-400/50 hover:border-purple-400 h-full flex flex-col justify-center">
          <div class="text-7xl mb-6">👑</div>
          <h3 class="text-2xl font-bold mb-8">Be Game Master</h3>
          <div class="mt-auto border-2 border-white/70 bg-black hover:bg-zinc-900 transition-all py-3 px-6 rounded-2xl text-white font-semibold text-base mx-6">
            Create a New Ssession
          </div>
        </div>

        <!-- Join Session -->
        <div class="bg-zinc-800 p-12 rounded-3xl border-2 border-zinc-700 hover:border-zinc-500 transition-all h-full flex flex-col justify-center">
          <div class="flex-1 flex items-center justify-center mb-8">
            <div class="text-7xl">🔑</div>
          </div>
          <h3 class="text-2xl font-bold text-center mb-8">Join Session</h3>
          
          <input id="joinCode" type="text" maxlength="6" placeholder="000000"
                 class="w-full text-center text-4xl tracking-widest bg-zinc-900 py-6 rounded-2xl focus:outline-none focus:ring-2 focus:ring-pink-500 mb-10 font-mono">
          
          <button onclick="joinGame()" 
                  class="w-2/3 mx-auto block bg-white text-zinc-900 py-4 rounded-2xl font-bold text-lg hover:bg-zinc-100 transition">
            JOIN SESSION
          </button>
        </div>
      </div>
    </div>

    <!-- GAME SCREEN - More breathing room -->
    <div id="game-screen" class="hidden bg-zinc-900 rounded-3xl overflow-hidden h-[680px] flex mt-8">   <!-- Taller + more margin -->
      <div class="w-80 bg-zinc-950 p-8 border-r border-zinc-800">   <!-- More padding -->
        <h3 class="text-pink-400 font-bold mb-6 text-lg">Players</h3>
        <div id="players-list" class="space-y-4"></div>   <!-- More space between players -->

        <button onclick="startGame()" id="start-btn"
                class="hidden w-full mt-12 bg-green-600 hover:bg-green-500 py-5 rounded-2xl font-bold text-lg transition">
          ▶️ START GAME ROUND
        </button>
      </div>

      <div class="flex-1 flex flex-col">
        <div class="bg-zinc-800 px-10 py-6 border-b flex justify-between items-center">   <!-- More padding -->
          <div id="game-status" class="font-semibold text-lg"></div>
          <div id="timer" class="font-mono text-5xl font-bold text-orange-400">60</div>
        </div>

        <div id="main-content" class="flex-1 flex items-center justify-center p-12 text-center text-xl">   <!-- More padding -->
          Waiting for Game Master to start the round...
        </div>

        <div id="chat-area" class="h-56 bg-zinc-950 border-t p-6 overflow-y-auto space-y-4 text-sm"></div>   <!-- More height + padding -->

        <div id="guess-area" class="hidden p-8 bg-zinc-950 border-t">
          <div class="flex gap-4">
            <input id="guess-input" type="text" placeholder="Type your guess here..." 
                   class="flex-1 bg-zinc-900 px-6 py-5 rounded-2xl focus:outline-none text-lg">
            <button onclick="submitGuess()" 
                    class="bg-pink-600 hover:bg-pink-500 px-12 rounded-2xl font-bold">GUESS</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal - More space -->
  <div id="question-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-10 w-full max-w-md mx-4">
      <h3 class="text-2xl font-bold mb-8 text-pink-400">Create New Round</h3>
      <!-- rest of modal stays same -->
      <div class="space-y-6">
        <div>
          <label class="block text-sm text-zinc-400 mb-2">Riddle / Question / Secret</label>
          <textarea id="modal-question" rows="3" class="w-full bg-zinc-800 rounded-2xl p-5 text-white resize-none focus:outline-none focus:ring-2 focus:ring-pink-500" placeholder="What has keys but can't open locks?"></textarea>
        </div>
        <div>
          <label class="block text-sm text-zinc-400 mb-2">Correct Answer</label>
          <input id="modal-answer" type="text" class="w-full bg-zinc-800 rounded-2xl p-5 text-white focus:outline-none focus:ring-2 focus:ring-pink-500" placeholder="piano">
        </div>
      </div>
      <div class="flex gap-4 mt-10">
        <button onclick="cancelModal()" class="flex-1 py-4 rounded-2xl border border-zinc-700 font-semibold">Cancel</button>
        <button onclick="submitQuestion()" class="flex-1 py-4 bg-pink-600 hover:bg-pink-500 rounded-2xl font-bold">START ROUND</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
